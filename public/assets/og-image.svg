<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F1035"/>
      <stop offset="55%"  stop-color="#1A0F4A"/>
      <stop offset="100%" stop-color="#0F1035"/>
    </linearGradient>
    <!-- Cyan glow radial -->
    <radialGradient id="glowCyan" cx="68%" cy="50%" r="40%">
      <stop offset="0%"  stop-color="#01BFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01BFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold glow radial -->
    <radialGradient id="glowGold" cx="20%" cy="30%" r="30%">
      <stop offset="0%"  stop-color="#FFD700" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan text gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#01BFFF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Clip circle for logo area -->
    <clipPath id="logoClip">
      <circle cx="200" cy="315" r="90"/>
    </clipPath>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowCyan)"/>
  <rect width="1200" height="630" fill="url(#glowGold)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#01BFFF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Vertical divider line -->
  <line x1="380" y1="80" x2="380" y2="550" stroke="#01BFFF" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Left side: Logo placeholder circle -->
  <circle cx="200" cy="270" r="90" fill="#2D1B69" stroke="#01BFFF" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Stylised E letter as logo stand-in -->
  <text x="200" y="300" font-family="Georgia, serif" font-size="88" fill="url(#cyanGrad)"
        text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">E</text>

  <!-- App name under logo -->
  <text x="200" y="395" font-family="Georgia, serif" font-size="26" fill="#01BFFF"
        text-anchor="middle" letter-spacing="8" opacity="0.9">ETHYRIA</text>

  <!-- Right side: Headline -->
  <text x="450" y="205" font-family="Georgia, serif" font-size="54" font-weight="700"
        fill="white" opacity="0.95">Deine Träume.</text>
  <text x="450" y="275" font-family="Georgia, serif" font-size="54" font-weight="700"
        fill="url(#cyanGrad)">Visuelle Realität.</text>

  <!-- Tagline -->
  <text x="450" y="340" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.70">
    KI-Traumdeutung · 5 Analyse-Modi · Traumtagebuch
  </text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="450" y="385" width="190" height="38" rx="19" fill="#01BFFF" fill-opacity="0.12"
        stroke="#01BFFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="545" y="409" font-family="Arial, sans-serif" font-size="16" fill="#01BFFF"
        text-anchor="middle">Jung &amp; Freud</text>
  <!-- Pill 2 -->
  <rect x="656" y="385" width="160" height="38" rx="19" fill="#A855F7" fill-opacity="0.12"
        stroke="#A855F7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="736" y="409" font-family="Arial, sans-serif" font-size="16" fill="#C084FC"
        text-anchor="middle">100 % kostenlos</text>
  <!-- Pill 3 -->
  <rect x="830" y="385" width="150" height="38" rx="19" fill="#FFD700" fill-opacity="0.10"
        stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
  <text x="905" y="409" font-family="Arial, sans-serif" font-size="16" fill="#FFD700"
        text-anchor="middle">Für Android</text>

  <!-- URL bar at bottom -->
  <rect x="0" y="580" width="1200" height="50" fill="#01BFFF" fill-opacity="0.07"/>
  <text x="600" y="611" font-family="Arial, sans-serif" font-size="18" fill="#01BFFF"
        text-anchor="middle" opacity="0.7">ostyles.github.io/ethyria</text>

  <!-- Decorative stars / dots -->
  <circle cx="90"  cy="80"  r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="330" cy="540" r="1.5" fill="#01BFFF" opacity="0.5"/>
  <circle cx="1150" cy="120" r="2" fill="#A855F7" opacity="0.5"/>
  <circle cx="1050" cy="500" r="1.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="500" cy="55"  r="1.5" fill="#01BFFF" opacity="0.4"/>
  <circle cx="980" cy="300" r="1.5" fill="#A855F7" opacity="0.3"/>
</svg>
